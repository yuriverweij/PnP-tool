[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "B008",  # FastAPI depends on function calls in default args
]

[tool.ruff.lint.isort]
known-first-party = ["processing"]

[tool.pytest.ini_options]
testpaths = ["tests"]
